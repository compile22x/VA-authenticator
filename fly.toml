# fly.toml app configuration file generated for authenticator on 2026-03-15T00:07:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'authenticator'
primary_region = 'iad'

[build]

# HTTP Auth API (for FA-Vertair and drone agents)
[http_service]
  internal_port = 19408
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
